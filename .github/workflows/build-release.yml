name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.3)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      from_ref:
        description: 'Changelog start ref (tag/commit/branch). Leave empty to auto-detect from last successful workflow run.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x64
            rid: win-x64
          - arch: arm64
            rid: win-arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version in .csproj and .iss files
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}"

          $csproj = Get-Content -LiteralPath 'TubaWinUi3.csproj' -Raw
          $csproj = $csproj -replace '<Version>[^<]*</Version>', "<Version>$ver</Version>"
          Set-Content -LiteralPath 'TubaWinUi3.csproj' -Value $csproj -NoNewline

          foreach ($iss in @('installer.iss', 'installer-x64.iss', 'installer-arm64.iss')) {
            if (Test-Path -LiteralPath $iss) {
              $content = Get-Content -LiteralPath $iss -Raw
              $content = $content -replace '#define MyAppVersion "[^"]*"', "#define MyAppVersion ""$ver"""
              Set-Content -LiteralPath $iss -Value $content -NoNewline
            }
          }

          Write-Host "Version updated to $ver"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish app
        run: |
          dotnet publish TubaWinUi3.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:Platform=${{ matrix.arch }} `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:WindowsAppSDKSelfContained=true `
            -p:WindowsPackageType=None `
            -o publish_${{ matrix.arch }}

      - name: Restore .pri file
        shell: pwsh
        run: |
          $priFile = "bin\${{ matrix.arch }}\Release\net10.0-windows10.0.26100.0\${{ matrix.rid }}\TubaWinUi3.pri"
          if (Test-Path -LiteralPath $priFile) {
            Copy-Item -LiteralPath $priFile -Destination publish_${{ matrix.arch }} -Force
            Write-Host "Restored TubaWinUi3.pri"
          }

      - name: Clean up publish directory
        shell: pwsh
        run: |
          $root = "publish_${{ matrix.arch }}"
          Get-ChildItem -LiteralPath $root -Filter '*.pdb' -Recurse -Force -ErrorAction SilentlyContinue |
            Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer-${{ matrix.arch }}.iss

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path "publish_${{ matrix.arch }}\*" `
            -DestinationPath "TubaWinUi3_Portable_${{ inputs.version }}_${{ matrix.arch }}.zip"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.arch }}
          path: SetupOutput\TubaWinUi3_Setup_*_${{ matrix.arch }}.exe

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.arch }}
          path: TubaWinUi3_Portable_${{ inputs.version }}_${{ matrix.arch }}.zip

  generate-changelog:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.ai-changelog.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve changelog start ref
        id: prev-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FROM_REF="${{ inputs.from_ref }}"

          if [ -n "$FROM_REF" ]; then
            echo "Using user-specified ref: $FROM_REF"
            SHA=$(git rev-parse "$FROM_REF" 2>/dev/null || echo "")
            if [ -z "$SHA" ]; then
              echo "::error::Cannot resolve ref '$FROM_REF'"
              exit 1
            fi
            echo "ref=$FROM_REF" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No manual ref specified, querying last successful workflow run..."
          LAST_RUN=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --status success \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha' 2>/dev/null || echo "")

          if [ -n "$LAST_RUN" ]; then
            SHORT_SHA=$(git rev-parse --short "$LAST_RUN" 2>/dev/null || echo "$LAST_RUN")
            echo "Last successful run was at commit $LAST_RUN"
            echo "ref=$LAST_RUN" >> "$GITHUB_OUTPUT"
          else
            echo "No previous successful run found, falling back to first commit"
            FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
            echo "ref=$FIRST_COMMIT" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog via DeepSeek
        id: ai-changelog
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          PREV_REF="${{ steps.prev-ref.outputs.ref }}"
          COMMIT_LOG=$(git log "$PREV_REF"..HEAD --pretty=format:"- %s (%h)" 2>/dev/null | head -100)
          CODE_DIFF=$(git diff "$PREV_REF"..HEAD --stat 2>/dev/null | head -80)
          CODE_DIFF_DETAIL=$(git diff "$PREV_REF"..HEAD -- '*.cs' '*.xaml' '*.csproj' '*.json' 2>/dev/null | head -3000)

          if [ -z "$COMMIT_LOG" ]; then
            COMMIT_LOG="- 首次发布"
          fi

          export COMMIT_LOG CODE_DIFF CODE_DIFF_DETAIL

          python3 .github/generate-changelog.py

  release:
    needs: [build, generate-changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release files
        run: |
          mkdir -p release_files
          find artifacts -type f \( -name '*.exe' -o -name '*.zip' \) -exec cp {} release_files/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: 图吧工具箱WinUI3 v${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          files: release_files/*
          body: |
            ## 图吧工具箱WinUI3 v${{ inputs.version }}

            ${{ needs.generate-changelog.outputs.changelog }}

            ### 下载
            | 文件 | 说明 |
            |------|------|
            | `TubaWinUi3_Setup_${{ inputs.version }}_x64.exe` | x64 安装包 |
            | `TubaWinUi3_Setup_${{ inputs.version }}_arm64.exe` | ARM64 安装包 |
            | `TubaWinUi3_Portable_${{ inputs.version }}_x64.zip` | x64 便携版 |
            | `TubaWinUi3_Portable_${{ inputs.version }}_arm64.zip` | ARM64 便携版 |
